<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-label="SUBSTRATE — A Zoom Across Scale">
  <defs>
    <radialGradient id="bg" cx="42%" cy="44%" r="80%">
      <stop offset="0%" stop-color="#0b1322"/>
      <stop offset="60%" stop-color="#060810"/>
      <stop offset="100%" stop-color="#04050a"/>
    </radialGradient>
    <linearGradient id="volt" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#36e0c4"/>
      <stop offset="100%" stop-color="#ff9e3d"/>
    </linearGradient>
    <filter id="glow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="6" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- circuit traces -->
  <g stroke="#36e0c4" stroke-width="1.5" opacity="0.30" fill="none">
    <path d="M0 120 H300 V200 H480"/>
    <path d="M0 240 H180 V340 H420"/>
    <path d="M1200 150 H940 V260 H760"/>
    <path d="M1200 360 H1000 V440 H800"/>
    <path d="M120 630 V460 H320 V360"/>
  </g>
  <g fill="#36e0c4" opacity="0.5">
    <circle cx="300" cy="200" r="4"/><circle cx="180" cy="340" r="4"/>
    <circle cx="940" cy="260" r="4"/><circle cx="1000" cy="440" r="4"/>
    <circle cx="320" cy="460" r="4"/>
  </g>

  <!-- nested scale frames: transistor -> chip -> device -> network -->
  <g transform="translate(600,315)" filter="url(#glow)">
    <rect x="-260" y="-150" width="520" height="300" rx="10" fill="none" stroke="url(#volt)" stroke-width="2" opacity="0.55"/>
    <rect x="-170" y="-98" width="340" height="196" rx="8" fill="none" stroke="#36e0c4" stroke-width="2" opacity="0.7"/>
    <rect x="-90" y="-52" width="180" height="104" rx="6" fill="none" stroke="#5fcad6" stroke-width="2.4"/>
    <rect x="-26" y="-15" width="52" height="30" rx="3" fill="#ff9e3d"/>
    <path d="M0 -42 V-15 M0 15 V42 M-50 0 H-26 M26 0 H50" stroke="#36e0c4" stroke-width="2.4" stroke-linecap="round"/>
  </g>

  <text x="80" y="120" font-family="'Space Grotesk', sans-serif" font-size="34" font-weight="700" letter-spacing="6" fill="#e6ebf2">SUBSTRATE</text>
  <text x="80" y="560" font-family="'IBM Plex Mono', monospace" font-size="22" fill="#36e0c4" letter-spacing="2">A ZOOM ACROSS SCALE — TRANSISTOR → NETWORK</text>
  <text x="80" y="595" font-family="'IBM Plex Mono', monospace" font-size="16" fill="#5b6678" letter-spacing="2">THREE.JS · GSAP · LENIS · PROCEDURAL</text>
</svg>
